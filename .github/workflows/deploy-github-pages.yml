name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: node scripts/build-github-pages.mjs
        env:
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}

      - name: Deploy to YatharthSharma1309.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_TOKEN }}
          external_repository: YatharthSharma1309/YatharthSharma1309.github.io
          publish_branch: main
          publish_dir: ./out
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
